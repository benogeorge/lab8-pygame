<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lab 8 Code Explorer</title>
  <meta name="description" content="Code explorer for the Lab 8 Pygame moving squares project." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="app.js"></script>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
  <div class="bg-glow bg-glow-b" aria-hidden="true"></div>

  <main class="shell">
    <header class="hero card">
      <div>
        <p class="eyebrow">Repository Explorer</p>
        <h1>Lab 8 Pygame</h1>
        <p class="lede">Inspect key files, search by intent, and trace the animation loop from setup to rendering.</p>
      </div>
      <section id="stats" class="stats" aria-label="Project stats"></section>
    </header>

    <section class="toolbar card">
      <label class="search-wrap" for="search">
        <span>Search by file name or concept</span>
        <input id="search" type="search" placeholder="flee, collisions, loop, report, journal" />
      </label>
      <div id="filters" class="filters" aria-label="File type filters"></div>
    </section>

    <section class="layout">
      <aside class="card sidebar">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Files</p>
            <h2>Tree</h2>
          </div>
          <p id="match-count" class="muted"></p>
        </div>
        <nav id="tree" class="tree" aria-label="Project files"></nav>
      </aside>

      <article class="card viewer">
        <div class="panel-head viewer-head">
          <div>
            <p class="eyebrow">Selection</p>
            <h2 id="file-title">main.py</h2>
            <p id="file-meta" class="muted"></p>
          </div>
          <button id="copy-button" class="ghost" type="button">Copy Snippet</button>
        </div>
        <pre class="code-wrap"><code id="code"></code></pre>
        <section id="insights" class="insights" aria-label="File insights"></section>
      </article>
    </section>

    <section class="card">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Architecture Notes</p>
          <h2>What Matters</h2>
        </div>
      </div>
      <section id="highlights" class="highlights"></section>
    </section>
  </main>
</body>
</html>
